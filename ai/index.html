<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的导航</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/links-nav.css">
<style>
/* ── 音乐播放器（网易云"正在播放"页风格：黑胶 + 滚动歌词 + 底部控制条） ── */
#music-panel {
  width:760px; height:480px; display:flex; flex-direction:column;
  background: linear-gradient(165deg,#1c1115 0%,#2a1014 55%,#170c0e 100%) !important;
}
#music-panel .modal-titlebar {
  background: rgba(0,0,0,.25) !important;
  border-bottom: .5px solid rgba(255,255,255,.08) !important;
}
#music-panel .modal-title { color: rgba(255,255,255,.75) !important; }
#music-body { flex:1; display:flex; position:relative; overflow:hidden; }

/* 左：黑胶封面 */
#music-disc-col {
  width:46%; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  padding:20px;
}
#music-cover-wrap {
  position:relative;
  width:220px; height:220px; border-radius:50%; flex-shrink:0;
  background: radial-gradient(circle at center,
              #050505 0 27%, #2b2b2b 27% 29%, #050505 29% 37%,
              #2b2b2b 37% 39%, #050505 39% 100%);
  box-shadow: 0 18px 40px rgba(0,0,0,.55), inset 0 0 0 5px #0a0a0a;
  display:flex; align-items:center; justify-content:center;
  animation: musicVinylSpin 11s linear infinite; animation-play-state: paused;
}
#music-panel.playing #music-cover-wrap { animation-play-state: running; }
@keyframes musicVinylSpin { to { transform: rotate(360deg); } }
#music-cover {
  width:60%; height:60%; object-fit:cover; border-radius:50%;
  box-shadow: 0 0 0 3px rgba(255,255,255,.1);
}
#music-cover-default {
  width:60%; height:60%; border-radius:50%;
  background: linear-gradient(135deg,#e8344a,#7a0a14);
  display:flex; align-items:center; justify-content:center;
  font-size:40px; color:#fff;
}
#music-needle {
  position:absolute; top:-12px; right:14px; width:16px; height:90px;
  transform-origin: top right; transform: rotate(-30deg);
  transition: transform .35s ease; pointer-events:none; z-index:2;
}
#music-needle::before {
  content:''; position:absolute; top:8px; right:6px; width:5px; height:74px;
  background: linear-gradient(#999,#555); border-radius:2px;
}
#music-needle::after {
  content:''; position:absolute; bottom:0; right:-6px; width:18px; height:18px;
  background:#e8344a; border-radius:50%; box-shadow:0 0 0 3px #2a2a2a, 0 2px 6px rgba(0,0,0,.5);
}
#music-panel.playing #music-needle { transform: rotate(-4deg); }

/* 右：标题 + 滚动歌词 + 控制条 */
#music-info-col {
  flex:1; display:flex; flex-direction:column; min-width:0;
  padding:28px 30px 20px;
}
#music-meta { flex-shrink:0; margin-bottom:14px; }
#music-title  { font-size:19px; font-weight:700; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#music-artist { font-size:12px; color:rgba(255,255,255,.5); margin-top:5px; }

#music-lyrics-wrap {
  flex:1; min-height:0; overflow-y:auto; padding:6px 2px;
  mask-image: linear-gradient(to bottom, transparent 0, #000 14%, #000 86%, transparent 100%);
  -webkit-mask-image: linear-gradient(to bottom, transparent 0, #000 14%, #000 86%, transparent 100%);
}
#music-lyrics-wrap::-webkit-scrollbar { width:0; }
.lrc-line {
  font-size:13px; line-height:1.9; color:rgba(255,255,255,.32);
  transition: color .25s, font-size .25s; padding:2px 0;
}
.lrc-line.active { color:#fff; font-weight:700; font-size:16px; }
.lrc-empty { font-size:13px; color:rgba(255,255,255,.4); padding:10px 0; }

#music-progress-wrap { display:flex; align-items:center; gap:8px; width:100%; margin:10px 0 6px; flex-shrink:0; }
#music-progress-wrap span { font-size:10px; color:rgba(255,255,255,.45); flex-shrink:0; }
#music-progress { flex:1; height:3px; cursor:pointer; accent-color:#e8344a; }
#music-controls { display:flex; align-items:center; gap:8px; width:100%; flex-shrink:0; }
.mc-btn { background:none; border:none; font-size:18px; cursor:pointer; padding:5px 7px; border-radius:50%; transition:background .15s; line-height:1; color:rgba(255,255,255,.85); }
.mc-btn:hover { background:rgba(232,52,74,.18); }
#mc-play {
  font-size:18px; width:42px; height:42px; display:flex; align-items:center; justify-content:center;
  background: linear-gradient(135deg,#e8344a,#b3132a); color:#fff;
}
#mc-play:hover { background: linear-gradient(135deg,#f0455a,#c41a32); }
#music-vol-wrap { display:flex; align-items:center; gap:4px; margin-left:2px; }
#music-vol-wrap span { font-size:13px; }
#music-vol { width:52px; height:3px; accent-color:#e8344a; }
#mc-list-toggle { margin-left:auto; }

/* 播放列表：默认收起的右侧抽屉，点击 ☰ 展开 */
#music-list-wrap {
  position:absolute; top:0; right:0; bottom:0; width:260px;
  background: rgba(10,5,6,.92); backdrop-filter: blur(10px);
  display:flex; flex-direction:column; overflow:hidden;
  transform: translateX(100%); transition: transform .25s ease;
  border-left: .5px solid rgba(255,255,255,.08); z-index:5;
}
#music-list-wrap.open { transform: translateX(0); }
#music-list-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 16px 10px; font-size:12px; font-weight:700; color:rgba(255,255,255,.5);
  border-bottom: .5px solid rgba(255,255,255,.07); flex-shrink:0;
}
#music-list-close { cursor:pointer; color:rgba(255,255,255,.4); font-size:13px; padding:2px 6px; }
#music-list-close:hover { color:#f06478; }
#music-list { flex:1; overflow-y:auto; padding:4px 0; }
#music-list::-webkit-scrollbar { width:4px; }
#music-list::-webkit-scrollbar-thumb { background:rgba(255,255,255,.12); border-radius:4px; }
.ml-item { display:flex; align-items:center; gap:8px; padding:8px 16px; cursor:pointer; transition:background .12s; border-radius:8px; margin:1px 8px; border-left: 3px solid transparent; }
.ml-item:hover { background:rgba(255,255,255,.06); }
.ml-item.active { background:rgba(232,52,74,.16); border-left-color:#e8344a; }
.ml-idx { font-size:11px; color:rgba(255,255,255,.3); width:18px; text-align:center; flex-shrink:0; }
.ml-item.active .ml-idx { color:#f06478; }
.ml-info { flex:1; overflow:hidden; }
.ml-title  { font-size:12px; font-weight:600; color:rgba(255,255,255,.92); display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.ml-item.active .ml-title { color:#fff; }
.ml-artist { font-size:10px; color:rgba(255,255,255,.4); display:block; }
.ml-del { font-size:11px; color:rgba(255,255,255,.25); cursor:pointer; padding:2px 4px; border-radius:4px; }
.ml-del:hover { color:#f06478; background:rgba(232,52,74,.15); }
@media (max-width:768px) {
  #music-panel { width:100vw!important; height:100vh!important; }
  #music-body  { flex-direction:column; }
  #music-disc-col { width:100%; padding:20px 20px 6px; }
  #music-cover-wrap { width:150px; height:150px; }
  #music-info-col { padding:10px 22px 18px; }
  #music-list-wrap { width:100%; }
}

/* ── 天气 ── */
#weather-panel { width:420px; min-height:360px; }
.wd-body { padding:0 0 16px; }
.wd-city-row { display:flex; align-items:center; gap:8px; padding:10px 16px 6px; flex-wrap:wrap; }
#wd-city-name { font-size:16px; font-weight:700; color:#2c3e5a; flex:1; }
.wd-city-input-wrap { display:flex; gap:4px; }
.wd-city-input-wrap input {
  border:.5px solid rgba(0,0,0,.15); border-radius:8px;
  padding:4px 10px; font-size:12px; outline:none; width:120px; font-family:inherit;
}
.wd-city-input-wrap button {
  padding:4px 12px; border-radius:8px; border:none;
  background:linear-gradient(135deg,#64a0dc,#3c78be);
  color:#fff; font-size:12px; cursor:pointer; font-family:inherit;
}
.wd-city-candidates {
  margin:0 16px 6px; border:.5px solid rgba(0,0,0,.1); border-radius:10px;
  overflow:hidden; background:rgba(255,255,255,.85);
}
.wd-candidate {
  padding:8px 12px; font-size:12px; cursor:pointer;
  display:flex; align-items:center; gap:8px;
  border-bottom:.5px solid rgba(0,0,0,.06);
}
.wd-candidate:last-child { border-bottom:none; }
.wd-candidate:hover { background:rgba(100,160,220,.1); }
.wd-candidate-name { font-weight:600; color:#2c3e5a; }
.wd-candidate-sub  { color:#999; font-size:11px; }
</style>
</head>
<body>

  <div class="orb orb1"></div>

</div>

<div id="pages-wrap">

</div>

  <div id="page-dots">
    <div class="page-dot active"></div>
    <button id="add-page-btn" title="新增页面">+</button>
  </div>
</div>

<div id="ctx-menu"></div>

<!-- ================================================================
     导航面板
     ================================================================ -->
<div class="modal-overlay" id="nav-overlay">
  <div class="modal-panel" id="nav-panel">
    <div class="modal-titlebar">
      <span class="modal-title">🧭 网址导航</span>

        <div class="tl tl-y" onclick="Modal.minimize('nav-overlay')" title="最小化"></div>
        <div class="tl tl-g" onclick="Modal.maximize('nav-overlay')" title="最大化"></div>
        <div class="tl tl-r" onclick="Modal.close('nav-overlay')" title="关闭"></div>
      </div>
    </div>
    <div class="nav-search-bar">
      <input class="nav-search-input" id="nav-search-input" placeholder="快速筛选网站...">
      <button class="nav-search-btn" id="nav-search-btn">打开第一个</button>
    </div>
    <div class="nav-body">
      <div class="nav-sidebar" id="nav-sidebar"></div>
      <div class="nav-content"  id="nav-content"></div>
    </div>
  </div>
</div>

<!-- ================================================================
     Links.json 快捷导航面板
     ================================================================ -->
<div class="modal-overlay" id="links-nav-overlay">
  <div class="modal-panel" id="links-nav-panel">
    <div class="modal-titlebar">
      <span class="modal-title">🔗 快捷导航</span>
      <div class="traffic-lights">
        <div class="tl tl-y" onclick="Modal.minimize('links-nav-overlay')" title="最小化"></div>
        <div class="tl tl-g" onclick="Modal.maximize('links-nav-overlay')" title="最大化"></div>
        <div class="tl tl-r" onclick="Modal.close('links-nav-overlay')" title="关闭"></div>
      </div>
      <button id="links-net-btn" class="links-net-btn">🌐 外网</button>
    </div>
    <div class="links-nav-body">
      <div id="links-nav-shortcut-grid"></div>
    </div>
  </div>
</div>

<!-- ================================================================
     记事本
     ================================================================ -->
<div class="modal-overlay" id="note-overlay">
  <div class="modal-panel" id="note-panel">
    <div class="modal-titlebar">
      <span class="modal-title">📝 记事本</span>
      <div class="traffic-lights">
        <div class="tl tl-y" onclick="Modal.minimize('note-overlay')" title="最小化"></div>
        <div class="tl tl-g" onclick="Modal.maximize('note-overlay')" title="最大化"></div>
        <div class="tl tl-r" onclick="Modal.close('note-overlay')" title="关闭"></div>
      </div>
    </div>
    <textarea id="note-area" placeholder="在这里记录你的想法..."></textarea>
    <div class="note-footer">
      <span id="note-count">0 字</span>
      <button class="note-save-btn" onclick="Widgets.saveNote()">💾 保存</button>
    </div>
  </div>
</div>

<!-- ================================================================
     画板
     ================================================================ -->
<div class="modal-overlay" id="draw-overlay">
  <div class="modal-panel" id="draw-panel">
    <div class="modal-titlebar">
      <span class="modal-title">🎨 画板</span>
      <div class="traffic-lights">
        <div class="tl tl-y" onclick="Modal.minimize('draw-overlay')" title="最小化"></div>
        <div class="tl tl-g" onclick="Modal.maximize('draw-overlay')" title="最大化"></div>
        <div class="tl tl-r" onclick="Modal.close('draw-overlay')" title="关闭"></div>
      </div>
    </div>
    <div id="draw-toolbar">
      <button class="dtool active" id="tool-pen"    onclick="Widgets.setTool('pen')">✏️ 画笔</button>
      <button class="dtool"        id="tool-eraser" onclick="Widgets.setTool('eraser')">🧹 橡皮</button>
      <div style="display:flex;gap:5px;align-items:center;">
        <div class="clr-dot active" style="background:#222"    data-c="#222"    onclick="Widgets.setColor(this)"></div>
        <div class="clr-dot"        style="background:#e8714a" data-c="#e8714a" onclick="Widgets.setColor(this)"></div>
        <div class="clr-dot"        style="background:#4a9edb" data-c="#4a9edb" onclick="Widgets.setColor(this)"></div>
        <div class="clr-dot"        style="background:#52b788" data-c="#52b788" onclick="Widgets.setColor(this)"></div>
        <div class="clr-dot"        style="background:#f5a623" data-c="#f5a623" onclick="Widgets.setColor(this)"></div>
        <div class="clr-dot"        style="background:#e63946" data-c="#e63946" onclick="Widgets.setColor(this)"></div>
        <div class="clr-dot"        style="background:#9b59b6" data-c="#9b59b6" onclick="Widgets.setColor(this)"></div>
      </div>
      <label style="font-size:11px;color:#888;">粗细</label>
      <input type="range" id="draw-sz" min="1" max="20" value="3" style="width:60px;accent-color:#e8714a;">
      <button class="dtool" style="margin-left:auto;color:#c0392b;" onclick="Widgets.clearCanvas()">🗑 清空</button>
      <button class="dtool" onclick="Widgets.saveCanvas()">💾 保存</button>
    </div>
    <canvas id="draw-canvas"></canvas>
  </div>
</div>



<!-- ================================================================
     天气详情（真实接口）
     ================================================================ -->
<div class="modal-overlay" id="weather-overlay">
  <div class="modal-panel" id="weather-panel">
    <div class="modal-titlebar">
      <span class="modal-title">🌤 天气</span>
      <div class="traffic-lights">
        <div class="tl tl-y" onclick="Modal.minimize('weather-overlay')" title="最小化"></div>
        <div class="tl tl-g" onclick="Modal.maximize('weather-overlay')" title="最大化"></div>
        <div class="tl tl-r" onclick="Modal.close('weather-overlay')" title="关闭"></div>
      </div>
    </div>
    <div class="wd-body" id="weather-body">
      <div class="wd-city-row">
        <span id="wd-city-name">--</span>
        <div class="wd-city-input-wrap">
          <input id="wd-city-input" type="text" placeholder="绑定城市，如：Beijing">
          <button onclick="Weather.bindCity()">绑定</button>
        </div>
      </div>
      <div id="wd-city-candidates" class="wd-city-candidates" style="display:none;"></div>
      <div id="wd-loading" style="text-align:center;padding:40px 0;color:#aaa;font-size:14px;">⏳ 正在获取天气...</div>
      <div id="wd-content" style="display:none;">
        <div class="wd-main">
          <div class="wd-big-temp" id="wd-temp">--°</div>
          <div class="wd-big-icon" id="wd-icon">🌤</div>
          <div class="wd-info">
            <p id="wd-feel">🌡 体感：--</p>
            <p id="wd-humidity">💧 湿度：--</p>
            <p id="wd-wind">🌬 风向：--</p>
            <p id="wd-desc">☁️ --</p>
          </div>
        </div>
        <div class="wd-5day" id="wd-forecast"></div>
      </div>
      <div id="wd-error" style="display:none;text-align:center;padding:30px;color:#e8714a;font-size:13px;"></div>
    </div>
  </div>
</div>

<!-- ================================================================
     设置
     ================================================================ -->
<div class="modal-overlay" id="settings-overlay">
  <div class="modal-panel" id="settings-panel">
    <div class="modal-titlebar">
      <span class="modal-title">⚙️ 设置</span>
      <div class="traffic-lights">
        <div class="tl tl-y" onclick="Modal.minimize('settings-overlay')" title="最小化"></div>
        <div class="tl tl-g" onclick="Modal.maximize('settings-overlay')" title="最大化"></div>
        <div class="tl tl-r" onclick="Modal.close('settings-overlay')" title="关闭"></div>
      </div>
    </div>
    <div class="settings-body">

      <!-- 背景图片 -->
      <div class="st-section">
        <h3>背景图片</h3>
        <div class="bg-opts bg-img-opts">
          <div class="bg-opt bg-img-opt active" data-bg-img="1.jpg" onclick="App.applyPresetImg(this,'images/1.jpg')">
            <img src="images/1.jpg" alt="壁纸1" loading="lazy">
          </div>
          <div class="bg-opt bg-img-opt" data-bg-img="2.jpg" onclick="App.applyPresetImg(this,'images/2.jpg')">
            <img src="images/2.jpg" alt="壁纸2" loading="lazy">
          </div>
          <div class="bg-opt bg-img-opt" data-bg-img="3.jpg" onclick="App.applyPresetImg(this,'images/3.jpg')">
            <img src="images/3.jpg" alt="壁纸3" loading="lazy">
          </div>
          <div class="bg-opt bg-img-opt" data-bg-img="4.jpg" onclick="App.applyPresetImg(this,'images/4.jpg')">
            <img src="images/4.jpg" alt="壁纸4" loading="lazy">
          </div>
        </div>
      </div>

      <!-- 内外网切换 -->
      <div class="st-section">
        <h3>网络模式</h3>
        <div class="net-row">
          <div class="net-opt" id="net-opt-internet" onclick="App.setNetMode('internet',this)">🌐 外网</div>
          <div class="net-opt" id="net-opt-intranet" onclick="App.setNetMode('intranet',this)">🏠 内网</div>
        </div>
        <p style="font-size:11px;color:#aaa;margin-top:6px;">切换后导航链接将使用对应的内/外网地址</p>
      </div>

      <!-- 搜索引擎（新区块，由 JS 动态渲染） -->
      <div id="se-section-container"></div>

      <!-- 图标设置 -->
      <div class="st-section">
        <h3>图标设置</h3>

        <div class="st-row">
          <div class="st-label">图标大小</div>
          <div class="is-slider-wrap">
            <input id="is-size" type="range" min="60" max="100" step="4" class="is-slider"
              oninput="document.getElementById('is-size-val').textContent=this.value+'px'"
              onchange="IconSettings.set('size', +this.value);">
            <span class="is-val" id="is-size-val">88px</span>
          </div>
        </div>

        <div class="st-row">
          <div class="st-label">图标圆角</div>
          <div class="is-slider-wrap">
            <input id="is-radius" type="range" min="0" max="40" step="2" class="is-slider"
              oninput="document.getElementById('is-radius-val').textContent=this.value+'px'"
              onchange="IconSettings.set('radius', +this.value);">
            <span class="is-val" id="is-radius-val">20px</span>
          </div>
        </div>

        <div class="st-row">
          <div class="st-label">图标文字颜色</div>
          <input id="is-labelcolor" type="color" value="#ffffff" class="is-color-picker"
            oninput="IconSettings.set('labelColor', this.value);">
        </div>

        <div class="st-row">
          <div class="st-label">显示图标文字</div>
          <label class="is-toggle">
            <input id="is-showlabel" type="checkbox" checked
              onchange="IconSettings.set('showLabel', this.checked);">
            <span class="is-toggle-track"><span class="is-toggle-thumb"></span></span>
          </label>
        </div>

        <div class="st-row">
          <div class="st-label">图标神奇效果</div>
          <label class="is-toggle">
            <input id="is-magic3d" type="checkbox" checked
              onchange="IconSettings.set('magic3d', this.checked);">
            <span class="is-toggle-track"><span class="is-toggle-thumb"></span></span>
          </label>
        </div>
      </div>



    </div>
  </div>
</div>

<!-- ================================================================
     音乐播放器
     ================================================================ -->

  <div class="modal-panel" id="music-panel">
    <div class="modal-titlebar">
      <span class="modal-title">🎵 音乐</span>
      <div class="traffic-lights">
        <div class="tl tl-y" onclick="Modal.minimize('music-overlay')" title="最小化"></div>
        <div class="tl tl-g" onclick="Modal.maximize('music-overlay')" title="最大化"></div>
        <div class="tl tl-r" onclick="Modal.close('music-overlay')" title="关闭"></div>
      </div>
    </div>
    <div id="music-body">
      <!-- 左：黑胶封面 -->
      <div id="music-disc-col">
        <div id="music-cover-wrap">
          <img id="music-cover" src="" alt="封面">
          <div id="music-cover-default">🎵</div>
          <div id="music-needle"></div>
        </div>
      </div>
      <!-- 右：标题 + 滚动歌词 + 控制条 -->
      <div id="music-info-col">
        <div id="music-meta">
          <div id="music-title">未播放</div>
          <div id="music-artist">--</div>
        </div>
        <div id="music-lyrics-wrap">
          <div id="music-lyrics"><div class="lrc-empty">暂无歌词</div></div>
        </div>
        <div id="music-progress-wrap">
          <span id="music-cur">0:00</span>
          <input id="music-progress" type="range" min="0" max="100" value="0" step="0.1">
          <span id="music-dur">0:00</span>
        </div>
        <div id="music-controls">
          <button class="mc-btn" id="mc-mode" title="循环模式" onclick="MusicPlayer.toggleMode()">🔁</button>
          <button class="mc-btn" onclick="MusicPlayer.prev()">⏮</button>
          <button class="mc-btn" id="mc-play" onclick="MusicPlayer.togglePlay()">▶️</button>
          <button class="mc-btn" onclick="MusicPlayer.next()">⏭</button>
          <div id="music-vol-wrap">
            <span>🔊</span>
            <input id="music-vol" type="range" min="0" max="1" step="0.05" value="0.8">
          </div>
          <button class="mc-btn" id="mc-list-toggle" title="播放列表" onclick="MusicPlayer.toggleList()">☰</button>
        </div>
      </div>
      <!-- 播放列表抽屉（默认收起，点击☰展开） -->
      <div id="music-list-wrap">
        <div id="music-list-header">
          <span>播放列表</span>
          <span id="music-list-close" onclick="MusicPlayer.toggleList()">✕</span>
        </div>
        <div id="music-list"></div>
      </div>
    </div>
  </div>
</div>

<!-- ================================================================
     文件夹（模板）
     ================================================================ -->
<div class="modal-overlay" id="folder-overlay">
  <div class="modal-panel" id="folder-panel">
    <div class="modal-titlebar">
      <span class="modal-title" id="folder-title">文件夹</span>
      <div class="traffic-lights">
        <div class="tl tl-y" onclick="Modal.minimize('folder-overlay')" title="最小化"></div>
        <div class="tl tl-g" onclick="Modal.maximize('folder-overlay')" title="最大化"></div>
        <div class="tl tl-r" onclick="Modal.close('folder-overlay')" title="关闭"></div>
      </div>
    </div>
    <div class="folder-grid" id="folder-grid"></div>
    <div class="folder-name-bar">
      <input id="folder-name-inp" type="text" placeholder="文件夹名称...">
      <button class="st-btn primary" onclick="saveFolderName()">确认</button>
    </div>
  </div>
</div>

<!-- ================================================================
     计算器
     ================================================================ -->
<div class="modal-overlay" id="calc-overlay">
  <div class="modal-panel" id="calc-panel">
    <div class="modal-titlebar">
      <span class="modal-title">🧮 计算器</span>
      <div class="traffic-lights">
        <div class="tl tl-y" onclick="Modal.minimize('calc-overlay')"></div>
        <div class="tl tl-g" onclick="Modal.maximize('calc-overlay')"></div>
        <div class="tl tl-r" onclick="Modal.close('calc-overlay')"></div>
      </div>
    </div>
    <div id="calc-display">
      <div id="calc-sub"></div>
      <div id="calc-main">0</div>
    </div>
    <div id="calc-sci">
      <button class="ck fn" onclick="Calc.press('sin')">sin</button>
      <button class="ck fn" onclick="Calc.press('cos')">cos</button>
      <button class="ck fn" onclick="Calc.press('tan')">tan</button>
      <button class="ck fn" onclick="Calc.press('log')">log</button>
      <button class="ck fn" onclick="Calc.press('ln')">ln</button>
    </div>
    <div id="calc-keys">
      <button class="ck fn" onclick="Calc.press('x²')">x²</button>
      <button class="ck fn" onclick="Calc.press('√')">√</button>
      <button class="ck fn" onclick="Calc.press('1/x')">1/x</button>
      <button class="ck fn" onclick="Calc.press('π')">π</button>
      <button class="ck ac"  onclick="Calc.press('AC')">AC</button>
      <button class="ck fn" onclick="Calc.press('±')">±</button>
      <button class="ck op" onclick="Calc.press('%')">%</button>
      <button class="ck op" onclick="Calc.press('÷')">÷</button>
      <button class="ck" onclick="Calc.press('7')">7</button>
      <button class="ck" onclick="Calc.press('8')">8</button>
      <button class="ck" onclick="Calc.press('9')">9</button>
      <button class="ck op" onclick="Calc.press('×')">×</button>
      <button class="ck" onclick="Calc.press('4')">4</button>
      <button class="ck" onclick="Calc.press('5')">5</button>
      <button class="ck" onclick="Calc.press('6')">6</button>
      <button class="ck op" onclick="Calc.press('-')">−</button>
      <button class="ck" onclick="Calc.press('1')">1</button>
      <button class="ck" onclick="Calc.press('2')">2</button>
      <button class="ck" onclick="Calc.press('3')">3</button>
      <button class="ck op" onclick="Calc.press('+')">+</button>
      <button class="ck fn" onclick="Calc.press('⌫')">⌫</button>
      <button class="ck span2" onclick="Calc.press('0')">0</button>
      <button class="ck" onclick="Calc.press('.')">.</button>
      <button class="ck eq" onclick="Calc.press('=')">=</button>
    </div>
  </div>
</div>
