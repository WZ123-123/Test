<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>王五导航</title>
<style>
*{ margin:0; padding:0; box-sizing:border-box; user-select:none; }
html, body{ width:100%; height:100%; overflow:hidden;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  background:#000; }

#background-container{ position:fixed; inset:0; z-index:0; overflow:hidden; background:#000; }
.bg-media{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; pointer-events:none; display:block; }
#background-container::after{ content:""; position:absolute; inset:0; background:rgba(0,0,0,0.35); z-index:1; }

.main-wrapper{
  position:relative; z-index:2; width:100%; height:100%;
  display:flex; flex-direction:column; justify-content:center; align-items:center;
  padding:20px;
  /* 整体上移：把默认居中点往上偏 */
  margin-top:-80px;
}

.site-title{
  font-size:4rem; font-weight:300; color:#fff; letter-spacing:8px;
  margin-bottom:2.5rem; text-shadow:0 6px 18px rgba(0,0,0,0.5);
  cursor:pointer; transition:opacity 0.2s;
  position:relative; /* 供菜单定位参考 */
}
.site-title:hover{ opacity:0.8; }

/* ── 模式切换菜单 ── */
#__mode-menu{
  position:fixed;
  z-index:99999;
  display:none;
  flex-direction:row;
  flex-wrap:wrap;
  gap:6px;
  padding:14px;
  border-radius:20px;
  background:rgba(12,12,12,0.55);
  backdrop-filter:blur(28px) saturate(160%);
  -webkit-backdrop-filter:blur(28px) saturate(160%);
  border:1px solid rgba(255,255,255,0.12);
  box-shadow:0 16px 48px rgba(0,0,0,0.55);
  max-width:400px;
}
#__mode-menu.open{ display:flex; }
#__mode-menu.layout-below{
  flex-direction:column;
  max-width:200px;
}
/* PC横排时的小标题 */
#__mode-menu-title{
  width:100%;
  padding:0 2px 8px;
  font-size:10px; font-weight:600;
  color:rgba(255,255,255,0.28);
  letter-spacing:0.12em; text-transform:uppercase;
  border-bottom:1px solid rgba(255,255,255,0.08);
  margin-bottom:2px;
}
#__mode-menu.layout-below #__mode-menu-title{ display:none; }

.__mc{
  display:flex; align-items:center; gap:9px;
  padding:8px 10px; border-radius:12px;
  text-decoration:none;
  border:1px solid transparent;
  transition:background 0.15s, border-color 0.15s;
  cursor:pointer;
}
/* PC横排：图标在上，文字在下 */
#__mode-menu:not(.layout-below) .__mc{
  flex-direction:column; align-items:center;
  gap:4px; padding:10px 8px;
  min-width:64px; max-width:64px;
}
.__mc:hover{
  background:rgba(255,255,255,0.1);
  border-color:rgba(255,255,255,0.18);
}
.__mc.cur{
  background:rgba(255,255,255,0.14);
  border-color:rgba(255,255,255,0.3);
}
.__mc-icon{ font-size:18px; line-height:1; }
.__mc-body{ display:flex; flex-direction:column; gap:1px; }
#__mode-menu:not(.layout-below) .__mc-body{ align-items:center; }
.__mc-label{
  font-size:11.5px; font-weight:600;
  color:rgba(255,255,255,0.9); line-height:1;
}
.__mc.cur .__mc-label{ color:#fff; }
.__mc-desc{ font-size:10px; color:rgba(255,255,255,0.38); line-height:1; }
#__mode-menu.layout-below .__mc-check{
  margin-left:auto; font-size:11px; color:rgba(255,255,255,0.55);
}
#__mode-menu:not(.layout-below) .__mc-check{ display:none; }
.__mc-dot{
  width:5px; height:5px; border-radius:50%; flex-shrink:0; margin-top:1px;
}
#__mode-menu:not(.layout-below) .__mc-dot{ display:none; }

/* ── 搜索框 ── */
.search-box-container{
  position:relative; width:100%; max-width:700px;
  display:flex; align-items:center; padding:6px 10px 6px 14px;
  border-radius:32px; background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
  box-shadow:0 10px 30px rgba(0,0,0,0.3); transition:0.3s;
}
.search-box-container:focus-within{
  transform:translateY(-2px); background:rgba(255,255,255,0.12);
  border-color:rgba(255,255,255,0.3); box-shadow:0 14px 40px rgba(0,0,0,0.45);
}

.engine-selector{ display:flex; align-items:center; gap:6px; padding:8px 12px;
  border-radius:18px; cursor:pointer; color:#fff; transition:0.2s; flex-shrink:0; }
.engine-selector:hover{ background:rgba(255,255,255,0.12); }
.engine-icon{ width:18px; height:18px; object-fit:contain; border-radius:4px; }

.search-input{ flex:1; border:none; outline:none; background:none;
  color:#fff; font-size:1.08rem; padding:12px; width:100%; }
.search-input::placeholder{ color:rgba(255,255,255,0.45); }

.action-btn{ width:38px; height:38px; display:flex; justify-content:center;
  align-items:center; border-radius:50%; cursor:pointer;
  color:rgba(255,255,255,0.7); transition:0.2s; flex-shrink:0; }
.action-btn:hover{ background:rgba(255,255,255,0.15); color:#fff; }
.clear-btn{ opacity:0; pointer-events:none; }
.clear-btn.show{ opacity:1; pointer-events:auto; }

.engine-dropdown{
  position:absolute; top:calc(100% + 12px); left:0; width:100%;
  padding:18px; border-radius:22px; background:rgba(15,15,15,0.7);
  border:1px solid rgba(255,255,255,0.12);
  backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
  box-shadow:0 15px 45px rgba(0,0,0,0.6);
  display:none; flex-direction:column; gap:16px; z-index:100;
}
.engine-dropdown.show{ display:flex; animation:fadeIn .22s ease-out; }
.category-row{ display:flex; flex-direction:column; gap:8px; }
.category-title{ color:rgba(255,255,255,0.4); font-size:.75rem;
  letter-spacing:1.5px; text-transform:uppercase; padding-left:4px; }
.engine-list{ display:flex; flex-wrap:wrap; gap:10px; }
.engine-item{ display:flex; align-items:center; gap:6px; padding:7px 14px;
  border-radius:14px; background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.05); color:rgba(255,255,255,0.85);
  cursor:pointer; transition:.2s; }
.engine-item:hover{ background:rgba(255,255,255,0.16); border-color:rgba(255,255,255,0.15); color:#fff; }

@keyframes fadeIn{ from{ opacity:0; transform:translateY(-10px); } to{ opacity:1; transform:translateY(0); } }

@media (max-width:768px){
  .main-wrapper{ margin-top:-50px; }
  .site-title{ font-size:2.8rem; letter-spacing:5px; }
  .search-box-container{ border-radius:24px; }
  .engine-selector{ font-size:.88rem; }
  .search-input{ font-size:1rem; }
}
</style>
</head>
<body>
<div id="background-container"></div>
<div class="main-wrapper">
  <h1 class="site-title" id="site-title">SPACE</h1>
  <div class="search-box-container">
    <div class="engine-selector" id="engine-selector">
      <span id="current-engine-icon-slot"></span>
      <span id="current-engine-name">百度</span>
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M6 9l6 6 6-6"/>
      </svg>
    </div>
    <input type="text" class="search-input" id="search-input" placeholder="输入搜索内容..." autocomplete="off" />
    <div class="action-btn clear-btn" id="clear-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </div>
    <div class="action-btn search-btn" id="search-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
    </div>
    <div class="engine-dropdown" id="engine-dropdown"></div>
  </div>
</div>

<script>
// ── 模式配置 ────────────────────────────────────────────────
const MODES = ['normal', 'webstack', 'easy', 'nav', '5iux', 'kim', 'ai'];
const MODE_PATHS = {
  normal:   '../normal/index.html',
  webstack: '../webstack/index.html',
  easy:     '../easy/index.html',
  nav:      '../nav/index.html',
  '5iux':   '../5IUX/index.html',
  kim:      '../kim/index.html',
  ai:       '../ai/index.html',
};
const MODE_META = {
  normal:   { label: 'Normal',   desc: '暗黑风格',  icon: '🌙', color: '#00ff88' },
  webstack: { label: 'WebStack', desc: '侧栏导航',  icon: '📐', color: '#1677ff' },
  easy:     { label: 'Easy',     desc: '极简搜索',  icon: '🔲', color: '#aaaaaa' },
  nav:      { label: 'Nav',      desc: '渐变主题',  icon: '🌊', color: '#a78bfa' },
  '5iux':   { label: '5IUX',    desc: '亮色简洁',  icon: '✨', color: '#667eea' },
  kim:      { label: 'Kim',      desc: '极彩背景',  icon: '🎨', color: '#f472b6' },
  ai:       { label: 'AI',       desc: 'AI 助手',   icon: '🤖', color: '#f59e0b' },
};
const CURRENT_MODE = 'easy';

// ── 模式菜单 ────────────────────────────────────────────────
let _modeMenuOpen = false;
let _modeMenuEl   = null;

function buildModeMenu() {
  if (_modeMenuEl) return _modeMenuEl;

  const menu = document.createElement('div');
  menu.id = '__mode-menu';

  const titleBar = document.createElement('div');
  titleBar.id = '__mode-menu-title';
  titleBar.textContent = '切换模式';
  menu.appendChild(titleBar);

  MODES.forEach(key => {
    const m = MODE_META[key];
    const a = document.createElement('a');
    a.href      = MODE_PATHS[key];
    a.className = '__mc' + (key === CURRENT_MODE ? ' cur' : '');
    a.innerHTML = `
      <div class="__mc-icon">${m.icon}</div>
      <div class="__mc-dot" style="background:${m.color}"></div>
      <div class="__mc-body">
        <div class="__mc-label">${m.label}</div>
        <div class="__mc-desc">${m.desc}</div>
      </div>
      <div class="__mc-check">${key === CURRENT_MODE ? '✓' : ''}</div>
    `;
    menu.appendChild(a);
  });

  document.body.appendChild(menu);
  _modeMenuEl = menu;
  return menu;
}

function positionModeMenu() {
  const titleEl = document.getElementById('site-title');
  const menu    = _modeMenuEl;
  if (!titleEl || !menu) return;

  const rect   = titleEl.getBoundingClientRect();
  const mobile = window.innerWidth < 768;
  const GAP    = 14;

  menu.classList.toggle('layout-below', mobile);

  if (mobile) {
    const menuW = Math.min(200, window.innerWidth - 24);
    let left = rect.left + rect.width / 2 - menuW / 2;
    left = Math.max(12, Math.min(left, window.innerWidth - menuW - 12));
    menu.style.top      = (rect.bottom + GAP + window.scrollY) + 'px';
    menu.style.left     = left + 'px';
    menu.style.right    = 'auto';
    menu.style.maxWidth = menuW + 'px';
  } else {
    // PC：标题右侧，与标题垂直居中对齐
    menu.style.top      = (rect.top + window.scrollY + rect.height / 2 - 55) + 'px';
    menu.style.left     = (rect.right + GAP) + 'px';
    menu.style.right    = 'auto';
    menu.style.maxWidth = '400px';

    requestAnimationFrame(() => {
      const mw = menu.offsetWidth;
      if (rect.right + GAP + mw > window.innerWidth - 12) {
        menu.style.left = Math.max(12, rect.left - GAP - mw) + 'px';
      }
    });
  }
}

function openModeMenu() {
  buildModeMenu();
  _modeMenuOpen = true;
  positionModeMenu();
  _modeMenuEl.classList.add('open');
}

function closeModeMenu() {
  _modeMenuOpen = false;
  if (_modeMenuEl) _modeMenuEl.classList.remove('open');
}

function toggleModeMenu(e) {
  e.stopPropagation();
  _modeMenuOpen ? closeModeMenu() : openModeMenu();
}

document.addEventListener('click', () => closeModeMenu());
window.addEventListener('resize', () => { if (_modeMenuOpen) positionModeMenu(); });

// ── 页面配置 ────────────────────────────────────────────────
const CONFIG = {
  title: "SPACE",
  background: {
    type: "image",
    url: "https://images.wallpaperscraft.com/image/single/photographer_camera_dark_133781_1280x720.jpg"
  },
  categories: [
    {
      name: "",
      engines: [
        { name:"百度",    url:"https://www.baidu.com/s?wd=",                    icon:"image/baidu.ico" },
        { name:"谷歌",    url:"https://www.google.com/search?q=",               icon:"image/google.ico" },
        { name:"GitHub",  url:"https://github.com/search?q=",                   icon:"image/github.png" },
        { name:"哔哩哔哩",url:"https://search.bilibili.com/all?keyword=",        icon:"image/bilibili.ico" },
        { name:"QQ音乐",  url:"https://y.qq.com/n/ryqq/search?w=",              icon:"image/QQmusic.ico" }
      ]
    }
  ]
};

let currentEngine = CONFIG.categories[0].engines[0];

function initPage() {
  initBackground();
  initDropdown();
  updateCurrentEngine(currentEngine);
}

function initBackground() {
  const bg = document.getElementById("background-container");
  if (CONFIG.background.type === "video") {
    bg.innerHTML = `<video class="bg-media" autoplay muted loop playsinline><source src="${CONFIG.background.url}" type="video/mp4"></video>`;
  } else {
    const img = document.createElement("img");
    img.className = "bg-media";
    img.src = CONFIG.background.url;
    img.onerror = () => { bg.style.background = "#111"; };
    bg.appendChild(img);
  }
}

function initDropdown() {
  const dropdown = document.getElementById("engine-dropdown");
  CONFIG.categories.forEach(category => {
    const row  = document.createElement("div");
    row.className = "category-row";
    row.innerHTML = `<div class="category-title">${category.name}</div>`;
    const list = document.createElement("div");
    list.className = "engine-list";
    category.engines.forEach(engine => {
      const item = document.createElement("div");
      item.className = "engine-item";
      item.innerHTML = engine.icon
        ? `<img src="${engine.icon}" class="engine-icon" onerror="this.style.display='none'"><span>${engine.name}</span>`
        : `<span>${engine.name}</span>`;
      item.addEventListener("click", e => {
        e.stopPropagation();
        updateCurrentEngine(engine);
        dropdown.classList.remove("show");
        searchInput.focus();
      });
      list.appendChild(item);
    });
    row.appendChild(list);
    dropdown.appendChild(row);
  });
}

function updateCurrentEngine(engine) {
  currentEngine = engine;
  document.getElementById("current-engine-name").innerText = engine.name;
  const slot = document.getElementById("current-engine-icon-slot");
  slot.innerHTML = engine.icon
    ? `<img src="${engine.icon}" class="engine-icon" onerror="this.style.display='none'">`
    : "";
}

function triggerSearch() {
  const query = searchInput.value.trim();
  if (!query) return;
  window.open(currentEngine.url + encodeURIComponent(query), "_blank");
}

const searchInput    = document.getElementById("search-input");
const clearBtn       = document.getElementById("clear-btn");
const searchBtn      = document.getElementById("search-btn");
const engineSelector = document.getElementById("engine-selector");
const dropdown       = document.getElementById("engine-dropdown");

searchInput.addEventListener("input", () => {
  clearBtn.classList.toggle("show", searchInput.value.trim().length > 0);
});
clearBtn.addEventListener("click", e => {
  e.stopPropagation(); searchInput.value = ""; clearBtn.classList.remove("show"); searchInput.focus();
});
searchBtn.addEventListener("click", e => { e.stopPropagation(); triggerSearch(); });
searchInput.addEventListener("keydown", e => { if (e.key === "Enter") triggerSearch(); });
engineSelector.addEventListener("click", e => { e.stopPropagation(); dropdown.classList.toggle("show"); });
document.addEventListener("click", () => { dropdown.classList.remove("show"); });

// 标题点击绑定模式菜单
document.getElementById('site-title').addEventListener('click', toggleModeMenu);

window.addEventListener("DOMContentLoaded", () => {
  localStorage.setItem('navMode', 'easy');
  initPage();
});
</script>
</body>
</html>
