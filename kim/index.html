<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>王五导航 · Kim</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧭</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'微软雅黑',-apple-system,sans-serif;font-size:14px;min-height:100vh;overflow-x:hidden;}
a{text-decoration:none;color:inherit;}

/* 背景 */
#bg-layer{position:fixed;inset:0;z-index:0;background:linear-gradient(135deg,#a8edea,#fed6e3);transition:background 0.5s;}
#bg-layer.bg-1{background:linear-gradient(135deg,#f5af19,#f12711);}
#bg-layer.bg-2{background:linear-gradient(135deg,#43cea2,#185a9d);}
#bg-layer.bg-3{background:linear-gradient(135deg,#c471ed,#f64f59);}
#bg-layer.bg-4{background:linear-gradient(135deg,#f7971e,#ffd200);}
#bg-layer.bg-5{background:linear-gradient(135deg,#11998e,#38ef7d);}
#bg-layer.bg-6{background:linear-gradient(135deg,#2c3e50,#4ca1af);}
#bg-layer.bg-img{background-size:cover!important;background-position:center!important;background-repeat:no-repeat!important;}

/* 顶部栏 */
#topbar{position:fixed;top:0;left:0;right:0;height:40px;z-index:200;background:rgba(0,0,0,0.12);display:flex;align-items:center;padding:0 14px;gap:10px;}
#site-title{color:#fff;font-size:1rem;font-weight:900;cursor:pointer;letter-spacing:0.05em;user-select:none;margin-right:auto;}
#site-title:hover{opacity:0.8;}
/* 换背景按钮 */
#bg-btn{background:none;border:none;cursor:pointer;color:#fff;font-size:1.1rem;opacity:0.85;padding:4px;line-height:1;transition:opacity 0.2s;}
#bg-btn:hover{opacity:1;}

/* 搜索区 */
#search-area{position:relative;z-index:10;padding:60px 0 24px;text-align:center;}
#engine-logo{width:210px;height:70px;margin:0 auto 16px;cursor:pointer;user-select:none;}
#engine-logo img{max-width:210px;max-height:70px;object-fit:contain;display:block;margin:0 auto;}
#search-box{display:flex;align-items:center;width:640px;height:44px;margin:0 auto;}
#search-input{flex:1;height:44px;padding:0 12px;border:1px solid #d7d7d7;border-right:none;border-radius:5px 0 0 5px;font-size:16px;outline:none;background:#fff;}
#search-btn{width:70px;height:44px;background:#aeaeae;border:1px solid #aeaeae;border-radius:0 5px 5px 0;cursor:pointer;font-size:18px;color:#fff;transition:background 0.2s;}
#search-btn:hover{background:#999;}

/* 主白卡 */
#web-site{position:relative;z-index:10;width:894px;margin:0 auto 60px;background:#fafafa;border-radius:5px;box-shadow:0 0 1px #797979;}

/* header: tabs + 内外网开关 */
#web-site-header{width:100%;height:55px;background:#fafafa;border-radius:5px 5px 0 0;box-shadow:0 1px 4px #e4e4e4;display:flex;align-items:center;padding:0 14px;gap:0;}
#cat-tabs{flex:1;display:flex;align-items:center;height:36px;overflow:hidden;}
.cat-tab{min-width:80px;height:34px;line-height:32px;border:1px solid #d7d7d7;background:#f5f5f7;font-size:14px;color:#333;text-align:center;cursor:pointer;user-select:none;transition:background 0.15s;border-right:none;padding:0 8px;white-space:nowrap;}
.cat-tab:first-child{border-radius:5px 0 0 5px;}
.cat-tab:last-child{border-right:1px solid #d7d7d7;border-radius:0 5px 5px 0;}
.cat-tab:hover{background:#c9c9c9;}
.cat-tab.active{background:#c9c9c9;color:#fff;border-color:#aeaeae;box-shadow:inset 1px 1px 8px 1px #aeaeae;}

/* 内外网开关（拨动样式） */
#net-switch-wrap{flex-shrink:0;display:flex;align-items:center;margin-left:14px;gap:6px;cursor:pointer;user-select:none;}
#net-switch-label{font-size:12px;color:#666;white-space:nowrap;}
#net-switch{position:relative;width:52px;height:24px;border-radius:12px;background:#ed5b49;border:1px solid #d2402e;cursor:pointer;transition:background 0.3s,border-color 0.3s;flex-shrink:0;}
#net-switch.on{background:#00af2c;border-color:#068506;}
#net-switch-knob{position:absolute;top:1px;left:1px;width:20px;height:20px;border-radius:50%;background:#fff;border:3px solid #c9c9c9;transition:left 0.3s;}
#net-switch.on #net-switch-knob{left:29px;}
#net-switch-text{position:absolute;inset:0;display:flex;align-items:center;font-size:11px;font-weight:600;color:#fff;pointer-events:none;}
#net-switch.on #net-switch-text{justify-content:flex-start;padding-left:6px;}
#net-switch:not(.on) #net-switch-text{justify-content:flex-end;padding-right:6px;}

/* 内容行 */
#web-site-body{width:100%;}
.web-group{display:flex;flex-wrap:wrap;align-items:center;width:100%;min-height:55px;overflow:hidden;}
.web-group:nth-child(odd){background:#f5f5f7;}
.web-group:nth-child(even){background:#fafafa;}
.web-group:last-child{border-radius:0 0 5px 5px;}
.web-group-spacer{flex-shrink:0;width:12px;}
.web-group-item{flex-shrink:0;width:130px;height:55px;display:flex;align-items:center;cursor:pointer;border-radius:3px;overflow:hidden;transition:background 0.15s;}
.web-group-item:hover{background:rgba(0,0,0,0.05);}
.web-group-icon{flex-shrink:0;width:24px;height:24px;margin-left:8px;border-radius:5px;overflow:hidden;}
.web-group-icon img{width:24px;height:24px;object-fit:contain;border-radius:4px;display:block;}
.web-group-name{flex:1;min-width:0;margin-left:6px;font-size:13px;color:#4d4d4d;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* 换背景面板 */
#bg-panel{display:none;position:fixed;inset:0;z-index:500;background:#fafafa;flex-direction:column;}
#bg-panel.open{display:flex;}
#bg-panel-header{position:relative;width:100%;height:50px;background:linear-gradient(90deg,#f12711,#c471ed);display:flex;align-items:center;padding:0 16px;}
#bg-panel-close{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;color:#fff;font-size:1.5rem;cursor:pointer;line-height:1;}
#bg-panel-body{flex:1;overflow-y:auto;padding:20px;}
#bg-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;}
.bg-item{cursor:pointer;border-radius:6px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.15);transition:box-shadow 0.2s;}
.bg-item:hover{box-shadow:0 4px 16px rgba(0,0,0,0.25);}
.bg-item.active{outline:3px solid #1677ff;}
.bg-preview{width:100%;height:140px;display:block;}
.bg-name{text-align:center;padding:6px 0;font-size:13px;background:#fff;color:#333;}

/* 响应式 */
@media(max-width:940px){#search-box{width:92vw;}#web-site{width:100%;border-radius:0;}#bg-grid{grid-template-columns:repeat(2,1fr);}.web-group-item{width:110px;}}
@media(max-width:600px){#engine-logo{width:140px;height:46px;}#engine-logo img{max-width:140px;max-height:46px;}.web-group-item{width:90px;}.web-group-name{font-size:11px;}.cat-tab{min-width:48px;font-size:12px;padding:0 4px;}#bg-grid{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>
<div id="bg-layer"></div>

<!-- 顶部栏 -->
<div id="topbar">
  <span id="site-title">🧭 王五导航</span>
  <button id="bg-btn" title="更换背景">🖼</button>
</div>

<!-- 搜索区 -->
<div id="search-area">
  <div id="engine-logo">
    <img id="engine-img" src="https://www.baidu.com/img/PCtopnew.png" alt="搜索引擎"
         onerror="this.src='https://ico.xmynscnq.dpdns.org/?domain=baidu.com'">
  </div>
  <div id="search-box">
    <input id="search-input" type="text" placeholder="百度一下" autocomplete="off"/>
    <button id="search-btn">🔍</button>
  </div>
</div>

<!-- 主卡片 -->
<div id="web-site">
  <div id="web-site-header">
    <div id="cat-tabs"></div>
    <!-- 内外网拨动开关 -->
    <div id="net-switch-wrap">
      <div id="net-switch">
        <div id="net-switch-knob"></div>
        <div id="net-switch-text">外网</div>
      </div>
    </div>
  </div>
  <div id="web-site-body">
    <p style="color:#999;text-align:center;padding:2rem;">加载中...</p>
  </div>
</div>

<!-- 换背景面板 -->
<div id="bg-panel">
  <div id="bg-panel-header">
    <button id="bg-panel-close">✕</button>
  </div>
  <div id="bg-panel-body">
    <div id="bg-grid"></div>
  </div>
</div>

<script>
const WORKER_URL   = 'https://ico.xmynscnq.dpdns.org';
const LINKS_FILE   = '../links.json';
const DEFAULT_ICON = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjOTk5IiBzdHJva2Utd2lkdGg9IjIiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIgc3Ryb2tlLWxpbmVqb2luPSJyb3VuZCI+PGNpcmNsZSBjeD0iMTIiIGN5PSIxMiIgcj0iMTAiPjwvY2lyY2xlPjxwYXRoIGQ9Ik0yIDEyaDIwIj48L3BhdGg+PHBhdGggZD0iTTEyIDJhMTUuMyAxNS4zIDAgMCAxIDQgMTAgMTUuMyAxNS4zIDAgMCAxLTQgMTAgMTUuMyAxNS4zIDAgMCAxLTQtMTAgMTUuMyAxNS4zIDAgMCAxIDQtMTB6Ij48L3BhdGg+PC9zdmc+';

// ── 模式切换 ──
const MODES = ['normal','webstack','easy','nav','5iux','kim'];
const MODE_PATHS = {normal:'../normal/index.html',webstack:'../webstack/index.html',easy:'../easy/index.html',nav:'../nav/index.html','5iux':'../5IUX/index.html',kim:'../kim/index.html'};
function switchMode(){const next=MODES[(MODES.indexOf('kim')+1)%MODES.length];localStorage.setItem('navMode',next);location.href=MODE_PATHS[next];}
document.getElementById('site-title').addEventListener('click',switchMode);

// ── 搜索引擎切换（百度↔Google）──
const ENGINES=[
  {name:'百度',url:'https://www.baidu.com/s?wd=',logo:'https://www.baidu.com/img/PCtopnew.png',fallback:'baidu.com'},
  {name:'Google',url:'https://www.google.com/search?q=',logo:'https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png',fallback:'google.com'},
];
let engineIdx=parseInt(localStorage.getItem('kimEngine')||'0')%ENGINES.length;
function updateEngine(){
  const e=ENGINES[engineIdx];
  const img=document.getElementById('engine-img');
  img.src=e.logo;
  img.onerror=function(){this.src=`${WORKER_URL}/?domain=${e.fallback}`;this.onerror=null;};
  document.getElementById('search-input').placeholder=e.name+'一下';
}
document.getElementById('engine-logo').addEventListener('click',()=>{
  engineIdx=(engineIdx+1)%ENGINES.length;
  localStorage.setItem('kimEngine',engineIdx);
  updateEngine();
});
updateEngine();

// ── 搜索 ──
document.getElementById('search-btn').addEventListener('click',doSearch);
document.getElementById('search-input').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
function doSearch(){const kw=document.getElementById('search-input').value.trim();if(kw)window.open(ENGINES[engineIdx].url+encodeURIComponent(kw),'_blank');}

// ── 内外网拨动开关 ──
let isIntranet=localStorage.getItem('netMode')==='intranet';
let _allData=null;
function getCardUrl(item){return(isIntranet&&item.intranet)?item.intranet:item.url;}
function getDomain(url){try{return new URL(url).hostname;}catch{return null;}}
function faviconSrc(url){const d=getDomain(url);return d?`${WORKER_URL}/?domain=${d}`:DEFAULT_ICON;}
function updateSwitch(){
  const sw=document.getElementById('net-switch');
  const txt=document.getElementById('net-switch-text');
  if(isIntranet){sw.classList.add('on');txt.textContent='内网';}
  else{sw.classList.remove('on');txt.textContent='外网';}
}
document.getElementById('net-switch-wrap').addEventListener('click',()=>{
  isIntranet=!isIntranet;
  localStorage.setItem('netMode',isIntranet?'intranet':'internet');
  updateSwitch();
  if(_allData)renderContent(_allData,_activeIdx);
});
updateSwitch();

// ── 背景切换 ──
const BG_OPTIONS=[
  {id:'default',name:'流光溢彩',type:'gradient',value:'linear-gradient(135deg,#a8edea,#fed6e3)'},
  {id:'bg-1',   name:'火焰',    type:'gradient',value:'linear-gradient(135deg,#f5af19,#f12711)'},
  {id:'bg-2',   name:'深海',    type:'gradient',value:'linear-gradient(135deg,#43cea2,#185a9d)'},
  {id:'bg-3',   name:'紫霞',    type:'gradient',value:'linear-gradient(135deg,#c471ed,#f64f59)'},
  {id:'bg-4',   name:'金沙',    type:'gradient',value:'linear-gradient(135deg,#f7971e,#ffd200)'},
  {id:'bg-5',   name:'翡翠',    type:'gradient',value:'linear-gradient(135deg,#11998e,#38ef7d)'},
  {id:'bg-6',   name:'夜空',    type:'gradient',value:'linear-gradient(135deg,#2c3e50,#4ca1af)'},
  {id:'bg-7',   name:'玫瑰',    type:'gradient',value:'linear-gradient(135deg,#ff6a88,#ff99ac)'},
];
let currentBg=localStorage.getItem('kimBg')||'default';
function applyBg(id){
  const opt=BG_OPTIONS.find(b=>b.id===id)||BG_OPTIONS[0];
  const layer=document.getElementById('bg-layer');
  layer.style.background=opt.value;
  currentBg=id;
  localStorage.setItem('kimBg',id);
  document.querySelectorAll('.bg-item').forEach(el=>el.classList.toggle('active',el.dataset.id===id));
}
function buildBgPanel(){
  const grid=document.getElementById('bg-grid');
  grid.innerHTML='';
  BG_OPTIONS.forEach(opt=>{
    const div=document.createElement('div');
    div.className='bg-item'+(opt.id===currentBg?' active':'');
    div.dataset.id=opt.id;
    const preview=document.createElement('div');
    preview.className='bg-preview';
    preview.style.background=opt.value;
    const name=document.createElement('div');
    name.className='bg-name';
    name.textContent=opt.name;
    div.appendChild(preview);
    div.appendChild(name);
    div.addEventListener('click',()=>{applyBg(opt.id);});
    grid.appendChild(div);
  });
}
document.getElementById('bg-btn').addEventListener('click',()=>{
  buildBgPanel();
  document.getElementById('bg-panel').classList.add('open');
});
document.getElementById('bg-panel-close').addEventListener('click',()=>{
  document.getElementById('bg-panel').classList.remove('open');
});
applyBg(currentBg);

// ── 分类Tab ──
let _activeIdx=0;
function renderTabs(sections){
  const tabs=document.getElementById('cat-tabs');
  tabs.innerHTML='';
  sections.forEach(({section},i)=>{
    const btn=document.createElement('div');
    btn.className='cat-tab'+(i===_activeIdx?' active':'');
    btn.textContent=section.replace(/^[\p{Emoji_Presentation}\p{Extended_Pictographic}]+/u,'').trim();
    btn.addEventListener('click',()=>{
      _activeIdx=i;
      document.querySelectorAll('.cat-tab').forEach(t=>t.classList.remove('active'));
      btn.classList.add('active');
      renderContent(sections,i);
    });
    tabs.appendChild(btn);
  });
}

// ── 渲染内容（只显示当前tab） ──
function renderContent(sections,idx){
  const body=document.getElementById('web-site-body');
  body.innerHTML='';
  const {items}=sections[idx];
  const group=document.createElement('div');
  group.className='web-group';
  const spacer=document.createElement('div');
  spacer.className='web-group-spacer';
  group.appendChild(spacer);
  items.forEach(item=>{
    const url=getCardUrl(item);
    const iconSrc=item.icon||faviconSrc(url);
    const title=item.title||'';
    const a=document.createElement('a');
    a.className='web-group-item';
    a.href=url;a.target='_blank';a.rel='noopener noreferrer';a.title=item.desc||title;
    const iconWrap=document.createElement('div');
    iconWrap.className='web-group-icon';
    const img=document.createElement('img');
    img.src=iconSrc;img.alt=title;img.loading='lazy';
    img.onerror=function(){this.src=DEFAULT_ICON;this.onerror=null;};
    iconWrap.appendChild(img);
    const name=document.createElement('span');
    name.className='web-group-name';name.textContent=title;
    a.appendChild(iconWrap);a.appendChild(name);
    group.appendChild(a);
  });
  body.appendChild(group);
}

// ── 入口 ──
(async()=>{
  localStorage.setItem('navMode','kim');
  try{
    const res=await fetch(LINKS_FILE);
    const data=await res.json();
    _allData=data;
    renderTabs(data);
    renderContent(data,0);
  }catch(e){
    document.getElementById('web-site-body').innerHTML='<p style="color:#999;text-align:center;padding:2rem;">链接数据加载失败</p>';
  }
})();
</script>
</body>
</html>
