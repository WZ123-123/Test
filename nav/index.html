<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>王五导航</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧭</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="bgLayer"></div>
<div id="bgOverlay"></div>

<!-- 左上：时钟 + 天气 -->
<div class="widget-corner" id="widget-tl">
  <div class="widget-box" id="clock-widget">
    <div id="clock-time">00:00:00</div>
    <div id="clock-date"></div>
  </div>
  <div class="widget-box" id="weather-widget">
    <div id="weather-main">
      <span id="weather-icon">🌤</span>
      <span id="weather-temp">--°C</span>
    </div>
    <div id="weather-desc">加载中…</div>
  </div>
</div>

<!-- 左下：格言 -->
<div class="widget-corner" id="widget-bl">
  <div class="widget-box" id="quote-widget" title="点击换一条">
    <span id="quote-text">加载中…</span>
    <span id="quote-from"></span>
  </div>
</div>

<!-- 右下：音乐播放器 -->
<div class="widget-corner" id="widget-br">
  <div class="widget-box" id="music-widget">
    <div id="music-title">未播放</div>
    <div id="music-controls">
      <button class="music-btn" id="music-prev" title="上一首">⏮</button>
      <button class="music-btn" id="music-play" title="播放/暂停">▶</button>
      <button class="music-btn" id="music-next" title="下一首">⏭</button>
      <div id="music-progress-wrap" title="进度">
        <div id="music-progress-bar"></div>
      </div>
    </div>
    <div id="music-volume-wrap">
      <span id="music-volume-icon">🔈</span>
      <input type="range" id="music-volume" min="0" max="1" step="0.05" value="0.7">
    </div>
    <button id="music-add-btn">＋ 添加音乐链接</button>
    <input type="text" id="music-url-input" placeholder="粘贴音频URL后回车" style="display:none;">
  </div>
</div>

<div class="container">
  <div class="header-area">
    <span class="header-icon">🧭</span>
    <div>
      <h1 id="site-title" title="点击切换模式" style="cursor:pointer;">王五导航</h1>
      <p class="header-subtitle">导航 · 搜索 · 直达</p>
    </div>
    <span class="header-icon">✦</span>
  </div>
  <div class="search-wrapper">
    <div class="search-tabs" id="searchTabs"></div>
    <div class="search-box">
      <button class="engine-trigger" id="engineTrigger" aria-label="切换搜索引擎">
        <img id="search-engine-icon" src="" alt="搜索引擎图标">
        <span class="engine-name" id="engineName"></span>
        <span class="engine-arrow" id="engineArrow">▾</span>
      </button>
      <div class="search-divider"></div>
      <input type="text" id="searchInput" placeholder="搜索网页 / 定位站内网站" autocomplete="off" oninput="filterLinks()" />
      <button class="clear-btn" id="clearBtn" aria-label="清空" style="display:none;" onclick="clearSearch()">✕</button>
      <button class="search-submit-btn" onclick="doSearch()" aria-label="搜索">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </div>
    <div class="engine-list" id="enginePanel" style="display:none;"></div>
  </div>
  <div id="main-content"></div>
</div>

<audio id="bg-audio" preload="none"></audio>

<script src="main.js"></script>
<script>
/* ===== 时钟 ===== */
(function() {
  const timeEl = document.getElementById('clock-time');
  const dateEl = document.getElementById('clock-date');
  const days = ['周日','周一','周二','周三','周四','周五','周六'];
  function tick() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    timeEl.textContent = `${h}:${m}:${s}`;
    const mo = now.getMonth()+1, d = now.getDate(), w = days[now.getDay()];
    dateEl.textContent = `${mo}月${d}日 ${w}`;
  }
  tick();
  setInterval(tick, 1000);
})();

/* ===== 天气 ===== */
(function() {
  const iconEl = document.getElementById('weather-icon');
  const tempEl = document.getElementById('weather-temp');
  const descEl = document.getElementById('weather-desc');
  function getWeatherIcon(c) {
    if(c===0) return '☀️'; if(c<=2) return '🌤'; if(c===3) return '☁️';
    if(c<=49) return '🌫'; if(c<=59) return '🌦'; if(c<=69) return '🌧';
    if(c<=79) return '❄️'; if(c<=84) return '🌧'; if(c<=99) return '⛈'; return '🌈';
  }
  function getWeatherText(c) {
    if(c===0) return '晴'; if(c<=2) return '少云'; if(c===3) return '阴';
    if(c<=49) return '雾'; if(c<=59) return '毛毛雨'; if(c<=69) return '雨';
    if(c<=79) return '雪'; if(c<=84) return '阵雨'; if(c<=99) return '雷雨'; return '未知';
  }
  const cached = sessionStorage.getItem('wx_cache');
  if(cached) {
    try {
      const {icon,temp,desc,ts} = JSON.parse(cached);
      if(Date.now()-ts < 5*60*1000) { iconEl.textContent=icon; tempEl.textContent=temp; descEl.textContent=desc; return; }
    } catch{}
  }
  fetch('https://api.open-meteo.com/v1/forecast?latitude=43.8868&longitude=125.3245&current=temperature_2m,weathercode,relative_humidity_2m&daily=temperature_2m_max,temperature_2m_min&timezone=Asia%2FShanghai&forecast_days=1')
    .then(r=>r.json()).then(data=>{
      const code = data.current.weathercode;
      const temp = Math.round(data.current.temperature_2m);
      const tmax = Math.round(data.daily.temperature_2m_max[0]);
      const tmin = Math.round(data.daily.temperature_2m_min[0]);
      const humid = data.current.relative_humidity_2m;
      const icon = getWeatherIcon(code);
      const desc = `${getWeatherText(code)}  ${tmin}~${tmax}°C  💧${humid}%`;
      iconEl.textContent = icon;
      tempEl.textContent = temp+'°C';
      descEl.textContent = desc;
      sessionStorage.setItem('wx_cache', JSON.stringify({icon,temp:temp+'°C',desc,ts:Date.now()}));
    }).catch(()=>{ descEl.textContent='获取失败'; });
})();

/* ===== 格言 ===== */
(function() {
  let quotes = [];
  let idx = -1;
  const textEl = document.getElementById('quote-text');
  const fromEl = document.getElementById('quote-from');
  function showNext() {
    if(!quotes.length) return;
    let ni; do { ni=Math.floor(Math.random()*quotes.length); } while(ni===idx&&quotes.length>1);
    idx=ni;
    const q=quotes[idx];
    textEl.textContent = q.text||'';
    fromEl.textContent = q.from ? '——'+q.from : '';
  }
  fetch('../quotes.json').then(r=>r.json()).then(data=>{ quotes=data; showNext(); }).catch(()=>{ textEl.textContent=''; });
  document.getElementById('quote-widget').addEventListener('click', showNext);
})();

/* ===== 音乐播放器 ===== */
(function() {
  const audio = document.getElementById('bg-audio');
  const playBtn = document.getElementById('music-play');
  const prevBtn = document.getElementById('music-prev');
  const nextBtn = document.getElementById('music-next');
  const titleEl = document.getElementById('music-title');
  const progressBar = document.getElementById('music-progress-bar');
  const progressWrap = document.getElementById('music-progress-wrap');
  const volumeInput = document.getElementById('music-volume');
  const addBtn = document.getElementById('music-add-btn');
  const urlInput = document.getElementById('music-url-input');

  let playlist = JSON.parse(localStorage.getItem('nav_playlist')||'[]');
  let current = 0;

  function savePlaylist() { localStorage.setItem('nav_playlist', JSON.stringify(playlist)); }

  function loadTrack(i) {
    if(!playlist.length) { titleEl.textContent='未播放'; return; }
    current = (i+playlist.length)%playlist.length;
    const track = playlist[current];
    audio.src = track.url;
    titleEl.textContent = track.name||'音轨 '+(current+1);
    audio.load();
    audio.play().catch(()=>{});
    playBtn.textContent='⏸';
  }

  function togglePlay() {
    if(!playlist.length) return;
    if(audio.paused) { audio.play(); playBtn.textContent='⏸'; }
    else { audio.pause(); playBtn.textContent='▶'; }
  }

  audio.addEventListener('timeupdate', ()=>{
    if(audio.duration) progressBar.style.width=(audio.currentTime/audio.duration*100)+'%';
  });
  audio.addEventListener('ended', ()=>loadTrack(current+1));
  audio.addEventListener('pause', ()=>playBtn.textContent='▶');
  audio.addEventListener('play',  ()=>playBtn.textContent='⏸');

  progressWrap.addEventListener('click', e=>{
    if(!audio.duration) return;
    const r = progressWrap.getBoundingClientRect();
    audio.currentTime = ((e.clientX-r.left)/r.width)*audio.duration;
  });

  volumeInput.value = audio.volume = 0.7;
  volumeInput.addEventListener('input', ()=>{ audio.volume=volumeInput.value; });

  playBtn.addEventListener('click', togglePlay);
  prevBtn.addEventListener('click', ()=>loadTrack(current-1));
  nextBtn.addEventListener('click', ()=>loadTrack(current+1));

  addBtn.addEventListener('click', ()=>{
    urlInput.style.display = urlInput.style.display==='none'?'block':'none';
    if(urlInput.style.display==='block') setTimeout(()=>urlInput.focus(),50);
  });

  urlInput.addEventListener('keydown', e=>{
    if(e.key==='Enter') {
      const url = urlInput.value.trim();
      if(!url) return;
      const name = url.split('/').pop().split('?')[0]||'音乐';
      playlist.push({url,name});
      savePlaylist();
      urlInput.value='';
      urlInput.style.display='none';
      if(playlist.length===1) loadTrack(0);
    }
    if(e.key==='Escape') { urlInput.style.display='none'; }
  });

  if(playlist.length) { titleEl.textContent=playlist[0].name||'音轨 1'; }
})();
</script>
</body>
</html>
